<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" fill="none">
  <defs>
    <linearGradient id="timerBody" x1="12" y1="18" x2="68" y2="72" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6ee7b7"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="timerFace" x1="16" y1="22" x2="64" y2="68" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#d1fae5"/>
      <stop offset="100%" stop-color="#a7f3d0"/>
    </linearGradient>
    <linearGradient id="hand" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f87171"/>
      <stop offset="100%" stop-color="#dc2626"/>
    </linearGradient>
    <filter id="tShadow">
      <feDropShadow dx="0" dy="6" stdDeviation="5" flood-color="#065f46" flood-opacity="0.4"/>
    </filter>
  </defs>

  <ellipse cx="40" cy="73" rx="18" ry="4" fill="#059669" opacity="0.2"/>

  <!-- Button top -->
  <rect x="36" y="8" width="8" height="8" rx="3" fill="#34d399"/>
  <rect x="30" y="12" width="20" height="6" rx="3" fill="#6ee7b7"/>
  <rect x="33" y="10" width="14" height="5" rx="2.5" fill="#10b981"/>

  <!-- Crown knobs -->
  <rect x="33" y="8" width="5" height="4" rx="2" fill="#a7f3d0" transform="rotate(-15 33 8)"/>
  <rect x="42" y="8" width="5" height="4" rx="2" fill="#a7f3d0" transform="rotate(15 44 8)"/>

  <!-- Body shadow -->
  <circle cx="40" cy="46" r="28" fill="#065f46" opacity="0.25" filter="url(#tShadow)"/>

  <!-- Body -->
  <circle cx="40" cy="46" r="26" fill="url(#timerBody)"/>

  <!-- Face -->
  <circle cx="40" cy="46" r="21" fill="url(#timerFace)"/>

  <!-- Shine -->
  <circle cx="33" cy="36" r="9" fill="white" opacity="0.2"/>

  <!-- Tick marks -->
  <line x1="40" y1="27" x2="40" y2="30" stroke="#059669" stroke-width="2" stroke-linecap="round"/>
  <line x1="40" y1="62" x2="40" y2="65" stroke="#059669" stroke-width="2" stroke-linecap="round"/>
  <line x1="21" y1="46" x2="24" y2="46" stroke="#059669" stroke-width="2" stroke-linecap="round"/>
  <line x1="56" y1="46" x2="59" y2="46" stroke="#059669" stroke-width="2" stroke-linecap="round"/>

  <!-- Smaller ticks -->
  <line x1="29" y1="30" x2="30.5" y2="32.5" stroke="#059669" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="51" y1="30" x2="49.5" y2="32.5" stroke="#059669" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="25" y1="38" x2="27.5" y2="39" stroke="#059669" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="55" y1="38" x2="52.5" y2="39" stroke="#059669" stroke-width="1.2" stroke-linecap="round"/>

  <!-- Progress arc (about 70% complete) -->
  <circle cx="40" cy="46" r="17" stroke="#10b981" stroke-width="3" fill="none" stroke-linecap="round"
    stroke-dasharray="75 106" stroke-dashoffset="26" transform="rotate(-90 40 46)"/>

  <!-- Minute hand -->
  <line x1="40" y1="46" x2="40" y2="31" stroke="#065f46" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Hour hand -->
  <line x1="40" y1="46" x2="50" y2="40" stroke="#065f46" stroke-width="2" stroke-linecap="round"/>

  <!-- Second hand -->
  <line x1="40" y1="46" x2="30" y2="58" stroke="#dc2626" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Center dot -->
  <circle cx="40" cy="46" r="3" fill="#065f46"/>
  <circle cx="40" cy="46" r="1.5" fill="#6ee7b7"/>
</svg>
