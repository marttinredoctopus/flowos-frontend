<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" fill="none">
  <defs>
    <linearGradient id="rBody" x1="10" y1="10" x2="70" y2="70" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="rHead" x1="14" y1="8" x2="66" y2="40" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#c4b5fd"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <filter id="robShadow">
      <feDropShadow dx="0" dy="6" stdDeviation="4" flood-color="#4c1d95" flood-opacity="0.45"/>
    </filter>
  </defs>

  <ellipse cx="40" cy="74" rx="20" ry="4" fill="#7c3aed" opacity="0.2"/>

  <!-- Antenna -->
  <line x1="40" y1="8" x2="40" y2="18" stroke="#c4b5fd" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="40" cy="7" r="4" fill="#f59e0b"/>
  <circle cx="40" cy="7" r="2.5" fill="#fde68a"/>

  <!-- Head -->
  <rect x="16" y="18" width="48" height="30" rx="10" fill="url(#rHead)" filter="url(#robShadow)"/>
  <rect x="16" y="18" width="48" height="8" rx="10" fill="white" opacity="0.12"/>

  <!-- Eyes -->
  <rect x="24" y="27" width="12" height="8" rx="4" fill="#0f172a"/>
  <circle cx="30" cy="31" r="3" fill="#06b6d4"/>
  <circle cx="31.5" cy="29.5" r="1" fill="white" opacity="0.8"/>

  <rect x="44" y="27" width="12" height="8" rx="4" fill="#0f172a"/>
  <circle cx="50" cy="31" r="3" fill="#06b6d4"/>
  <circle cx="51.5" cy="29.5" r="1" fill="white" opacity="0.8"/>

  <!-- Mouth panel -->
  <rect x="26" y="39" width="28" height="6" rx="3" fill="#0f172a" opacity="0.7"/>
  <rect x="28" y="40.5" width="5" height="3" rx="1.5" fill="#10b981" opacity="0.9"/>
  <rect x="35" y="40.5" width="5" height="3" rx="1.5" fill="#10b981" opacity="0.7"/>
  <rect x="42" y="40.5" width="5" height="3" rx="1.5" fill="#10b981" opacity="0.5"/>

  <!-- Body -->
  <rect x="22" y="50" width="36" height="20" rx="8" fill="url(#rBody)" filter="url(#robShadow)"/>
  <rect x="22" y="50" width="36" height="7" rx="8" fill="white" opacity="0.1"/>

  <!-- Chest panel -->
  <rect x="30" y="56" width="20" height="10" rx="4" fill="#0f172a" opacity="0.5"/>
  <circle cx="35" cy="61" r="2.5" fill="#f59e0b"/>
  <circle cx="40" cy="61" r="2.5" fill="#10b981"/>
  <circle cx="45" cy="61" r="2.5" fill="#ef4444"/>

  <!-- Arms -->
  <rect x="8" y="52" width="12" height="6" rx="3" fill="url(#rBody)"/>
  <rect x="60" y="52" width="12" height="6" rx="3" fill="url(#rBody)"/>

  <!-- Ear bolt details -->
  <circle cx="16" cy="31" r="3" fill="#8b5cf6"/>
  <circle cx="64" cy="31" r="3" fill="#8b5cf6"/>
</svg>
