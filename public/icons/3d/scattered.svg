<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" fill="none">
  <defs>
    <linearGradient id="appCard" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f87171"/>
      <stop offset="100%" stop-color="#dc2626"/>
    </linearGradient>
  </defs>
  <!-- Multiple scattered app tiles -->
  <rect x="8" y="28" width="22" height="22" rx="6" fill="#6366f1" transform="rotate(-12 8 28)"/>
  <rect x="9" y="29" width="20" height="20" rx="5" fill="#818cf8" transform="rotate(-12 8 28)"/>
  <text x="18" y="41" text-anchor="middle" font-size="10" fill="white" transform="rotate(-12 8 28)">T</text>

  <rect x="42" y="10" width="20" height="20" rx="6" fill="#0891b2" transform="rotate(8 42 10)"/>
  <rect x="43" y="11" width="18" height="18" rx="5" fill="#22d3ee" transform="rotate(8 42 10)"/>
  <text x="52" y="23" text-anchor="middle" font-size="10" fill="white" transform="rotate(8 42 10)">S</text>

  <rect x="50" y="42" width="20" height="20" rx="6" fill="#059669" transform="rotate(5 50 42)"/>
  <rect x="51" y="43" width="18" height="18" rx="5" fill="#34d399" transform="rotate(5 50 42)"/>
  <text x="60" y="55" text-anchor="middle" font-size="10" fill="white" transform="rotate(5 50 42)">N</text>

  <rect x="20" y="52" width="18" height="18" rx="5" fill="#d97706" transform="rotate(-6 20 52)"/>
  <rect x="21" y="53" width="16" height="16" rx="4" fill="#fbbf24" transform="rotate(-6 20 52)"/>
  <text x="29" y="64" text-anchor="middle" font-size="10" fill="white" transform="rotate(-6 20 52)">H</text>

  <!-- Chaos arrows -->
