<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" fill="none">
  <defs>
    <radialGradient id="orb" cx="40" cy="38" r="26" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#fde68a"/>
      <stop offset="40%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#d97706"/>
    </radialGradient>
    <radialGradient id="orbInner" cx="34" cy="32" r="14" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#fef3c7"/>
      <stop offset="100%" stop-color="#fbbf24" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="sparkGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Ground shadow -->
  <ellipse cx="40" cy="73" rx="20" ry="4" fill="#d97706" opacity="0.2"/>

  <!-- Outer glow ring -->
  <circle cx="40" cy="38" r="28" fill="#f59e0b" opacity="0.08"/>

  <!-- Main orb -->
  <circle cx="40" cy="38" r="24" fill="url(#orb)" filter="url(#glow)"/>

  <!-- Inner shine -->
  <circle cx="40" cy="38" r="24" fill="url(#orbInner)"/>

  <!-- Ring 1 -->
  <ellipse cx="40" cy="38" rx="24" ry="9" stroke="#fbbf24" stroke-width="1.5" fill="none" opacity="0.6" transform="rotate(-30 40 38)"/>
  <!-- Ring 2 -->
  <ellipse cx="40" cy="38" rx="24" ry="9" stroke="#fde68a" stroke-width="1" fill="none" opacity="0.4" transform="rotate(30 40 38)"/>

  <!-- Brain nodes -->
  <circle cx="33" cy="34" r="3" fill="white" opacity="0.9"/>
  <circle cx="47" cy="34" r="3" fill="white" opacity="0.9"/>
  <circle cx="40" cy="42" r="3" fill="white" opacity="0.9"/>
  <circle cx="33" cy="44" r="2" fill="white" opacity="0.7"/>
  <circle cx="47" cy="44" r="2" fill="white" opacity="0.7"/>

  <!-- Connections -->
  <line x1="33" y1="34" x2="47" y2="34" stroke="white" stroke-width="1.2" opacity="0.6"/>
  <line x1="33" y1="34" x2="40" y2="42" stroke="white" stroke-width="1.2" opacity="0.6"/>
  <line x1="47" y1="34" x2="40" y2="42" stroke="white" stroke-width="1.2" opacity="0.6"/>
  <line x1="33" y1="44" x2="40" y2="42" stroke="white" stroke-width="1" opacity="0.4"/>
  <line x1="47" y1="44" x2="40" y2="42" stroke="white" stroke-width="1" opacity="0.4"/>

  <!-- Spark 1 -->
  <path d="M57 18 L59 23 L64 20 L60 25 L65 27 L60 27 L62 33 L57 28 L52 33 L54 27 L49 27 L54 25 L50 20 L55 23 Z" fill="#fde68a" opacity="0.95" filter="url(#sparkGlow)" transform="scale(0.6) translate(38 4)"/>

  <!-- Spark 2 (small) -->
  <path d="M57 18 L59 23 L64 20 L60 25 L65 27 L60 27 L62 33 L57 28 L52 33 L54 27 L49 27 L54 25 L50 20 L55 23 Z" fill="white" opacity="0.8" filter="url(#sparkGlow)" transform="scale(0.3) translate(58 140)"/>

  <!-- Top highlight -->
  <circle cx="34" cy="30" r="8" fill="white" opacity="0.12"/>
</svg>
