<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="80" y2="80" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <linearGradient id="bgDark" x1="0" y1="0" x2="80" y2="80" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="100%" stop-color="#3730a3"/>
    </linearGradient>
    <linearGradient id="paper" x1="14" y1="12" x2="58" y2="70" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#e0e7ff"/>
      <stop offset="100%" stop-color="#c7d2fe"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-10%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="6" flood-color="#4338ca" flood-opacity="0.5"/>
    </filter>
    <filter id="innerGlow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Outer glow -->
  <ellipse cx="40" cy="72" rx="22" ry="5" fill="#6366f1" opacity="0.25"/>

  <!-- Card shadow -->
  <rect x="17" y="18" width="46" height="52" rx="9" fill="#3730a3" opacity="0.5" filter="url(#shadow)"/>

  <!-- Card body -->
  <rect x="14" y="12" width="46" height="52" rx="9" fill="url(#bg)"/>

  <!-- Card face (paper) -->
  <rect x="19" y="17" width="36" height="42" rx="6" fill="url(#paper)"/>

  <!-- Shine highlight -->
  <rect x="19" y="17" width="36" height="16" rx="6" fill="white" opacity="0.18"/>

  <!-- Check line 1 -->
  <circle cx="27" cy="29" r="4" fill="#6366f1" opacity="0.9"/>
  <path d="M25 29 L26.5 30.5 L29 27.5" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="34" y="27" width="14" height="2.5" rx="1.25" fill="#6366f1" opacity="0.6"/>
  <rect x="34" y="30" width="9" height="1.5" rx="0.75" fill="#6366f1" opacity="0.3"/>

  <!-- Check line 2 -->
  <circle cx="27" cy="40" r="4" fill="#8b5cf6" opacity="0.9"/>
  <path d="M25 40 L26.5 41.5 L29 38.5" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="34" y="38" width="14" height="2.5" rx="1.25" fill="#8b5cf6" opacity="0.6"/>
  <rect x="34" y="41" width="11" height="1.5" rx="0.75" fill="#8b5cf6" opacity="0.3"/>

  <!-- Partial line 3 (in progress) -->
  <circle cx="27" cy="51" r="4" fill="white" opacity="0.5" stroke="#a5b4fc" stroke-width="1.5"/>
  <rect x="34" y="49" width="10" height="2.5" rx="1.25" fill="#a5b4fc" opacity="0.5"/>
  <rect x="34" y="52" width="7" height="1.5" rx="0.75" fill="#a5b4fc" opacity="0.3"/>

  <!-- Top edge highlight -->
  <rect x="14" y="12" width="46" height="4" rx="9" fill="white" opacity="0.15"/>
</svg>
