<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" fill="none">
  <defs>
    <linearGradient id="paletteBase" x1="10" y1="10" x2="70" y2="70" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f9fafb"/>
      <stop offset="100%" stop-color="#e5e7eb"/>
    </linearGradient>
    <linearGradient id="paletteSide" x1="10" y1="70" x2="70" y2="10" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#9ca3af"/>
      <stop offset="100%" stop-color="#d1d5db"/>
    </linearGradient>
    <filter id="palShadow">
      <feDropShadow dx="0" dy="6" stdDeviation="5" flood-color="#6b21a8" flood-opacity="0.35"/>
    </filter>
    <linearGradient id="brushGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
  </defs>

  <!-- Shadow -->
  <ellipse cx="40" cy="73" rx="22" ry="4.5" fill="#7c3aed" opacity="0.2"/>

  <!-- Palette shape (rounded kidney) -->
  <path d="M14 40 C14 24 24 12 40 12 C56 12 66 22 66 36 C66 50 58 62 44 64 C38 65 32 62 30 58 C26 52 14 56 14 40 Z" fill="url(#paletteBase)" filter="url(#palShadow)"/>

  <!-- Palette side depth -->
  <path d="M14 40 C14 24 24 12 40 12 C56 12 66 22 66 36" stroke="#d1d5db" stroke-width="0" fill="none"/>

  <!-- Thumb hole -->
  <ellipse cx="34" cy="52" rx="7" ry="9" fill="#c4b5fd" opacity="0.4"/>
  <ellipse cx="34" cy="52" rx="5" ry="7" fill="#0f172a" opacity="0.55"/>

  <!-- Color swatches -->
  <circle cx="28" cy="28" r="7" fill="#f87171"/>
  <circle cx="28" cy="28" r="7" fill="url(#paletteBase)" opacity="0.0"/>
  <circle cx="28" cy="28" r="5.5" fill="#ef4444"/>
  <circle cx="26" cy="26" r="2" fill="white" opacity="0.4"/>

  <circle cx="42" cy="22" r="6.5" fill="#fbbf24"/>
  <circle cx="42" cy="22" r="5" fill="#f59e0b"/>
  <circle cx="40" cy="20" r="2" fill="white" opacity="0.4"/>

  <circle cx="56" cy="28" r="6.5" fill="#34d399"/>
  <circle cx="56" cy="28" r="5" fill="#10b981"/>
  <circle cx="54" cy="26" r="2" fill="white" opacity="0.4"/>

  <circle cx="60" cy="42" r="6" fill="#60a5fa"/>
  <circle cx="60" cy="42" r="4.5" fill="#3b82f6"/>
  <circle cx="58" cy="40" r="1.8" fill="white" opacity="0.4"/>

  <circle cx="20" cy="40" r="5.5" fill="#c084fc"/>
  <circle cx="20" cy="40" r="4" fill="#a855f7"/>
  <circle cx="18.5" cy="38.5" r="1.5" fill="white" opacity="0.4"/>

  <!-- Brush -->
  <rect x="54" y="8" width="5" height="22" rx="2.5" fill="url(#brushGrad)" transform="rotate(35 54 8)"/>
  <path d="M56 28 C57 30 60 33 59 36 C58 38 55 36 54 34 Z" fill="#fde68a"/>
  <path d="M56 28 C55 30 52 32 53 35 C54 37 56 36 57 34 Z" fill="#f59e0b"/>

  <!-- Palette shine -->
  <path d="M18 30 C20 20 30 14 40 13" stroke="white" stroke-width="2.5" stroke-linecap="round" opacity="0.3"/>
</svg>
