<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" fill="none">
  <defs>
    <radialGradient id="outer" cx="40" cy="40" r="30" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#059669"/>
    </radialGradient>
    <filter id="tgShadow">
      <feDropShadow dx="0" dy="6" stdDeviation="5" flood-color="#064e3b" flood-opacity="0.4"/>
    </filter>
  </defs>

  <ellipse cx="40" cy="73" rx="18" ry="4" fill="#059669" opacity="0.2"/>

  <!-- Rings -->
  <circle cx="40" cy="40" r="30" fill="#f0fdf4" filter="url(#tgShadow)"/>
  <circle cx="40" cy="40" r="30" fill="url(#outer)" opacity="0.25"/>
  <circle cx="40" cy="40" r="30" stroke="#34d399" stroke-width="3" fill="none"/>

  <circle cx="40" cy="40" r="22" fill="white"/>
  <circle cx="40" cy="40" r="22" stroke="#10b981" stroke-width="3" fill="none"/>

  <circle cx="40" cy="40" r="14" fill="#d1fae5"/>
  <circle cx="40" cy="40" r="14" stroke="#059669" stroke-width="3" fill="none"/>

  <!-- Bullseye -->
  <circle cx="40" cy="40" r="6" fill="#059669"/>
  <circle cx="40" cy="40" r="3" fill="#d1fae5"/>

  <!-- Cross hairs -->
  <line x1="40" y1="8" x2="40" y2="24" stroke="#34d399" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
  <line x1="40" y1="56" x2="40" y2="72" stroke="#34d399" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
  <line x1="8" y1="40" x2="24" y2="40" stroke="#34d399" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
  <line x1="56" y1="40" x2="72" y2="40" stroke="#34d399" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>

  <!-- Arrow -->
  <line x1="58" y1="12" x2="44" y2="36" stroke="#f59e0b" stroke-width="3" stroke-linecap="round"/>
  <polygon points="44,36 40,32 48,30" fill="#f59e0b"/>
  <circle cx="59" cy="11" r="4" fill="#fde68a"/>
</svg>
