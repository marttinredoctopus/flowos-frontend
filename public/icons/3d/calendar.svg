<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" fill="none">
  <defs>
    <linearGradient id="calBody" x1="10" y1="10" x2="70" y2="70" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="calTop" x1="10" y1="10" x2="70" y2="30" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#c4b5fd"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="calFace" x1="14" y1="28" x2="66" y2="70" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ede9fe"/>
      <stop offset="100%" stop-color="#ddd6fe"/>
    </linearGradient>
    <filter id="calShadow">
      <feDropShadow dx="0" dy="6" stdDeviation="5" flood-color="#5b21b6" flood-opacity="0.45"/>
    </filter>
  </defs>

  <ellipse cx="40" cy="73" rx="20" ry="4" fill="#7c3aed" opacity="0.2"/>

  <!-- Body -->
  <rect x="12" y="18" width="56" height="52" rx="10" fill="url(#calBody)" filter="url(#calShadow)"/>

  <!-- Header bar -->
  <rect x="12" y="18" width="56" height="20" rx="10" fill="url(#calTop)"/>
  <rect x="12" y="28" width="56" height="10" fill="url(#calTop)"/>

  <!-- Face (white area) -->
  <rect x="17" y="38" width="46" height="28" rx="5" fill="url(#calFace)"/>

  <!-- Binding pegs -->
  <rect x="26" y="12" width="6" height="16" rx="3" fill="#c4b5fd"/>
  <rect x="26" y="12" width="6" height="16" rx="3" fill="url(#calBody)" opacity="0.3"/>
  <rect x="48" y="12" width="6" height="16" rx="3" fill="#c4b5fd"/>
  <rect x="48" y="12" width="6" height="16" rx="3" fill="url(#calBody)" opacity="0.3"/>

  <!-- Month label -->
  <text x="40" y="32" text-anchor="middle" font-family="Inter, sans-serif" font-size="8" font-weight="700" fill="white" opacity="0.95">MARCH</text>

  <!-- Day grid -->
  <!-- Row 1 -->
  <circle cx="25" cy="46" r="3.5" fill="#c4b5fd" opacity="0.5"/>
  <circle cx="33" cy="46" r="3.5" fill="#c4b5fd" opacity="0.5"/>
  <circle cx="41" cy="46" r="3.5" fill="#c4b5fd" opacity="0.5"/>
  <circle cx="49" cy="46" r="3.5" fill="#c4b5fd" opacity="0.5"/>
  <circle cx="57" cy="46" r="3.5" fill="#c4b5fd" opacity="0.5"/>

  <!-- Row 2 -->
  <circle cx="25" cy="55" r="3.5" fill="#c4b5fd" opacity="0.5"/>
  <circle cx="33" cy="55" r="4" fill="#7c3aed"/>
  <text x="33" y="57.5" text-anchor="middle" font-size="5" fill="white" font-weight="700">18</text>
  <circle cx="41" cy="55" r="3.5" fill="#c4b5fd" opacity="0.5"/>
  <circle cx="49" cy="55" r="3.5" fill="#c4b5fd" opacity="0.5"/>
  <circle cx="57" cy="55" r="3.5" fill="#c4b5fd" opacity="0.5"/>

  <!-- Row 3 -->
  <circle cx="25" cy="63" r="3.5" fill="#c4b5fd" opacity="0.5"/>
  <circle cx="33" cy="63" r="3.5" fill="#c4b5fd" opacity="0.5"/>
  <circle cx="41" cy="63" r="3.5" fill="#c4b5fd" opacity="0.5"/>

  <!-- Header shine -->
  <rect x="12" y="18" width="56" height="5" rx="10" fill="white" opacity="0.15"/>
</svg>
