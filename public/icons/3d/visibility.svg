<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" fill="none">
  <defs>
    <radialGradient id="eyeGrad" cx="40" cy="40" r="28" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#fde68a"/>
      <stop offset="60%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#d97706"/>
    </radialGradient>
  </defs>

  <!-- Eye shape -->
  <path d="M8 40 C16 24 28 16 40 16 C52 16 64 24 72 40 C64 56 52 64 40 64 C28 64 16 56 8 40 Z" fill="#1e293b" stroke="#334155" stroke-width="2"/>

  <!-- Iris -->
  <circle cx="40" cy="40" r="16" fill="#6366f1"/>
  <circle cx="40" cy="40" r="14" fill="#4f46e5"/>

  <!-- Pupil -->
  <circle cx="40" cy="40" r="8" fill="#1e1b4b"/>

  <!-- Iris details -->
  <path d="M26 40 A14 14 0 0 1 40 26" stroke="#818cf8" stroke-width="1.5" fill="none" opacity="0.6"/>
  <path d="M54 40 A14 14 0 0 1 40 54" stroke="#818cf8" stroke-width="1" fill="none" opacity="0.4"/>

  <!-- Eye shine -->
  <circle cx="34" cy="34" r="4" fill="white" opacity="0.3"/>
  <circle cx="36" cy="35" r="2" fill="white" opacity="0.6"/>

  <!-- Slash / blocked line -->
  <line x1="16" y1="16" x2="64" y2="64" stroke="#ef4444" stroke-width="5" stroke-linecap="round"/>
  <line x1="16" y1="16" x2="64" y2="64" stroke="#fca5a5" stroke-width="2" stroke-linecap="round"/>

  <!-- Question mark badge -->
  <circle cx="62" cy="16" r="10" fill="#f59e0b"/>
  <text x="62" y="21" text-anchor="middle" font-size="13" font-weight="900" fill="white" font-family="Arial">?</text>
</svg>
