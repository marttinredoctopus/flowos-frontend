<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" fill="none">
  <defs>
    <linearGradient id="clockBody" x1="12" y1="12" x2="68" y2="68" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#fca5a5"/>
      <stop offset="100%" stop-color="#ef4444"/>
    </linearGradient>
  </defs>

  <ellipse cx="40" cy="74" rx="18" ry="3.5" fill="#ef4444" opacity="0.2"/>

  <!-- Cracked body -->
  <circle cx="40" cy="42" r="26" fill="url(#clockBody)" opacity="0.95"/>
  <circle cx="40" cy="42" r="22" fill="#fef2f2"/>

  <!-- Crack line -->
  <path d="M40 20 L44 30 L38 36 L43 48 L40 68" stroke="#ef4444" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Tick marks -->
  <line x1="40" y1="22" x2="40" y2="26" stroke="#f87171" stroke-width="2" stroke-linecap="round"/>
  <line x1="40" y1="58" x2="40" y2="62" stroke="#f87171" stroke-width="2" stroke-linecap="round"/>
  <line x1="20" y1="42" x2="24" y2="42" stroke="#f87171" stroke-width="2" stroke-linecap="round"/>
  <line x1="56" y1="42" x2="60" y2="42" stroke="#f87171" stroke-width="2" stroke-linecap="round"/>

  <!-- Clock hands (askew) -->
  <line x1="40" y1="42" x2="40" y2="29" stroke="#dc2626" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="40" y1="42" x2="53" y2="48" stroke="#dc2626" stroke-width="2" stroke-linecap="round"/>

  <!-- Center -->
  <circle cx="40" cy="42" r="3" fill="#dc2626"/>

  <!-- Top knob -->
  <rect x="37" y="14" width="6" height="7" rx="3" fill="#f87171"/>

  <!-- Alert badge -->
  <circle cx="60" cy="18" r="10" fill="#f59e0b"/>
  <text x="60" y="23" text-anchor="middle" font-size="14" font-weight="900" fill="white" font-family="Arial">!</text>
</svg>
