<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" fill="none">
  <defs>
    <linearGradient id="chart" x1="10" y1="10" x2="70" y2="70" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f472b6"/>
      <stop offset="100%" stop-color="#db2777"/>
    </linearGradient>
    <linearGradient id="bar1g" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f9a8d4"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
    <linearGradient id="bar2g" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c084fc"/>
      <stop offset="100%" stop-color="#9333ea"/>
    </linearGradient>
    <linearGradient id="bar3g" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f472b6"/>
      <stop offset="100%" stop-color="#db2777"/>
    </linearGradient>
    <filter id="chartShadow">
      <feDropShadow dx="0" dy="6" stdDeviation="5" flood-color="#9d174d" flood-opacity="0.4"/>
    </filter>
  </defs>

  <ellipse cx="40" cy="73" rx="22" ry="4" fill="#db2777" opacity="0.2"/>

  <!-- Board bg -->
  <rect x="10" y="14" width="60" height="52" rx="10" fill="url(#chart)" filter="url(#chartShadow)"/>
  <rect x="14" y="18" width="52" height="44" rx="7" fill="#fdf2f8" opacity="0.12"/>
  <rect x="14" y="18" width="52" height="44" rx="7" fill="#0f172a" opacity="0.35"/>

  <!-- Grid lines -->
  <line x1="19" y1="52" x2="61" y2="52" stroke="white" stroke-width="0.8" opacity="0.15"/>
  <line x1="19" y1="44" x2="61" y2="44" stroke="white" stroke-width="0.8" opacity="0.15"/>
  <line x1="19" y1="36" x2="61" y2="36" stroke="white" stroke-width="0.8" opacity="0.15"/>

  <!-- Bar 1 -->
  <rect x="21" y="42" width="9" height="18" rx="3" fill="url(#bar1g)"/>
  <rect x="21" y="42" width="9" height="4" rx="3" fill="white" opacity="0.2"/>

  <!-- Bar 2 -->
  <rect x="34" y="32" width="9" height="28" rx="3" fill="url(#bar2g)"/>
  <rect x="34" y="32" width="9" height="4" rx="3" fill="white" opacity="0.2"/>

  <!-- Bar 3 -->
  <rect x="47" y="24" width="9" height="36" rx="3" fill="url(#bar3g)"/>
  <rect x="47" y="24" width="9" height="4" rx="3" fill="white" opacity="0.2"/>

  <!-- Trend line -->
  <path d="M25 43 L38 33 L51 25" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="3 2" opacity="0.7"/>

  <!-- Up arrow badge -->
  <circle cx="61" cy="18" r="9" fill="#10b981"/>
  <path d="M57 20 L61 15 L65 20 M61 15 L61 23" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Board shine -->
  <rect x="10" y="14" width="60" height="6" rx="10" fill="white" opacity="0.12"/>
</svg>
